<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | HaQQ Computers & Technology</title>
<link rel="icon" href="assets/logo-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .error-page{ min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--ink); color:#fff; text-align:center; padding:40px 20px; }
  .error-code{ font-family:var(--mono); font-size:14px; color:var(--cyan); letter-spacing:.1em; margin-bottom:20px; }
  .error-page h1{ font-size:clamp(36px,6vw,64px); margin-bottom:18px; }
  .error-page p{ color:rgba(255,255,255,.65); max-width:44ch; margin:0 auto 34px; line-height:1.6; }
  .error-actions{ display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="error-page">
  <div>
    <div class="error-code">ERROR 404 — SIGNAL LOST</div>
    <h1>This page went off-grid.</h1>
    <p>The page you're looking for doesn't exist, moved, or the link's a little broken — not your fault.</p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="contact.html" class="btn btn-ghost-dark">Contact Us</a>
    </div>
  </div>
</div>
</body>
</html>
